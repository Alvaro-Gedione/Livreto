<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Press Start - Escola Ideal</title>

    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <style>
        /* VARIÁVEIS DE TEMA (Modo Claro Padrão) */
        :root {
            --bg-sky: #d4f6ff;
            --brightness-assets: 1;
        }

        /* MODO ESCURO (Noite) */
        body.dark-mode {
            --bg-sky: #1a233a;
            --brightness-assets: 0.6;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Baloo 2', cursive;
        }

        body {
            padding-top: 85px;
            background-color: var(--bg-sky);
            transition: background-color 0.8s ease;
            min-height: 150vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* =========================================
           BACKGROUND PARALLAX (Camadas)
           ========================================= */
        .parallax-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        /* Nuvens animadas - Múltiplas nuvens com posições diferentes */
        .cloud {
            position: absolute;
            background-image: url('src/img/background/cloud.png');
            background-size: contain;
            background-repeat: no-repeat;
            opacity: 0.7;
            filter: brightness(var(--brightness-assets));
            transition: filter 0.8s ease;
            animation: floatCloud linear infinite;
        }

        @keyframes floatCloud {
            0% {
                transform: translateX(-100px);
            }

            100% {
                transform: translateX(calc(100vw + 100px));
            }
        }

        /* Nuvem 1 */
        .cloud-1 {
            top: 5%;
            left: -150px;
            width: 180px;
            height: 100px;
            animation-duration: 35s;
            animation-delay: 0s;
        }

        /* Nuvem 2 */
        .cloud-2 {
            top: 15%;
            left: -200px;
            width: 250px;
            height: 140px;
            animation-duration: 45s;
            animation-delay: -10s;
        }

        /* Nuvem 3 */
        .cloud-3 {
            top: 25%;
            left: -120px;
            width: 160px;
            height: 90px;
            animation-duration: 30s;
            animation-delay: -20s;
        }

        /* Nuvem 4 */
        .cloud-4 {
            top: 8%;
            left: -300px;
            width: 220px;
            height: 120px;
            animation-duration: 50s;
            animation-delay: -5s;
        }

        /* Nuvem 5 */
        .cloud-5 {
            top: 20%;
            left: -180px;
            width: 140px;
            height: 80px;
            animation-duration: 38s;
            animation-delay: -15s;
        }

        /* Escola e Árvores - Atrás do chão */
        .layer-school {
            position: absolute;
            bottom: 30%;
            left: 2%;
            width: 350px;
            filter: brightness(var(--brightness-assets));
            transition: filter 0.8s ease;
            z-index: 1;
        }

        .layer-tree-1 {
            position: absolute;
            bottom: 30%;
            right: 15%;
            width: 100px;
            filter: brightness(var(--brightness-assets));
            transition: filter 0.8s ease;
            z-index: 1;
        }

        .layer-tree-2 {
            position: absolute;
            bottom: 33%;
            right: 8%;
            width: 80px;
            filter: brightness(var(--brightness-assets));
            transition: filter 0.8s ease;
            z-index: 1;
        }

        /* Chão 1 - Fundo (ground02.png - montanha) */
        .layer-ground-back {
            position: absolute;
            bottom: 35%;
            left: 0;
            width: 100%;
            height: 35vh;
            background-image: url('src/img/background/ground02.png');
            background-size: cover;
            background-position: top center;
            background-repeat: repeat-x;
            filter: brightness(var(--brightness-assets));
            transition: filter 0.8s ease;
            z-index: 0;
        }

        /* Chão 2 - Meio */
        .layer-ground-mid {
            position: absolute;
            bottom: 15%;
            left: 0;
            width: 100%;
            height: 30vh;
            background-image: url('src/img/background/ground02.png');
            background-size: cover;
            background-position: top center;
            background-repeat: repeat-x;
            filter: brightness(var(--brightness-assets));
            transition: filter 0.8s ease;
            z-index: 2;
            opacity: 0.9;
        }

        /* Chão 3 - Frente (ground.png) */
        .layer-ground-front {
            position: absolute;
            bottom: -10%;
            left: 0;
            width: 100%;
            height: 50vh;
            background-image: url('src/img/background/ground.png');
            background-size: cover;
            background-position: top center;
            background-repeat: repeat-x;
            filter: brightness(var(--brightness-assets));
            transition: filter 0.8s ease;
            z-index: 3;
        }

        /* Folhas caindo - Múltiplas folhas com posições e animações diferentes */
        .leaf {
            position: absolute;
            background-image: url('src/img/background/leave.png');
            background-size: contain;
            background-repeat: no-repeat;
            opacity: 0.6;
            filter: brightness(var(--brightness-assets));
            transition: filter 0.8s ease;
            pointer-events: none;
            width: 25px;
            height: 25px;
        }

        @keyframes fallLeaf1 {
            0% {
                transform: translateY(-100px) rotate(0deg);
                opacity: 0;
            }

            10% {
                opacity: 0.6;
            }

            90% {
                opacity: 0.6;
            }

            100% {
                transform: translateY(100vh) rotate(360deg);
                opacity: 0;
            }
        }

        @keyframes fallLeaf2 {
            0% {
                transform: translateY(-100px) rotate(0deg);
                opacity: 0;
            }

            10% {
                opacity: 0.5;
            }

            90% {
                opacity: 0.5;
            }

            100% {
                transform: translateY(100vh) rotate(-360deg);
                opacity: 0;
            }
        }

        @keyframes fallLeaf3 {
            0% {
                transform: translateY(-100px) rotate(0deg);
                opacity: 0;
            }

            10% {
                opacity: 0.7;
            }

            90% {
                opacity: 0.7;
            }

            100% {
                transform: translateY(100vh) rotate(720deg);
                opacity: 0;
            }
        }

        /* =========================================
           INTERFACE (Header e Main)
           ========================================= */
        header {
            background-color: white;
            padding: 0px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
        }

        .logo img {
            height: 67.5px;
            width: auto;
            object-fit: contain;
            transition: height 0.3s ease;
            display: block;
        }

        nav {
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .nav-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            border-radius: 25px;
            color: white;
            text-decoration: none;
            font-weight: 700;
            font-size: 16px;
            text-transform: uppercase;
        }

        .bg-blue {
            background-color: #4f91e8;
        }

        .bg-orange {
            background-color: #ffa45b;
        }

        .bg-yellow {
            background-color: #ffcc14;
        }

        .bg-red {
            background-color: #ff6b6b;
        }

        .bg-green {
            background-color: #92b165;
        }

        .user-area {
            margin-left: 10px;
        }

        .user-badge {
            background-color: #92b165;
            padding: 5px 8px 5px 15px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: white;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        .user-badge i {
            cursor: pointer;
            transition: transform 0.2s;
        }

        .user-badge i:hover {
            transform: scale(1.2);
        }

        .user-name {
            font-weight: 700;
            font-size: 16px;
        }

        .user-avatar {
            width: 38px;
            height: 38px;
            background-color: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 50px;
            position: relative;
            z-index: 1;
        }

        .main-title {
            color: #4f91e8;
            font-size: 32px;
            font-weight: 800;
            text-transform: uppercase;
            margin-bottom: 50px;
            text-shadow: 2px 2px 0px white, -2px -2px 0px white, 2px -2px 0px white, -2px 2px 0px white;
            text-align: center;
            padding: 0 20px;
        }

        .cards-container {
            display: flex;
            gap: 30px;
            justify-content: center;
            align-items: center;
            width: 100%;
            flex-wrap: wrap;
            padding: 0 20px;
        }

        .card {
            width: 240px;
            height: 240px;
            border-radius: 25px;
            border: 4px solid white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-decoration: none;
            box-shadow: 0 10px 15px rgba(0, 0, 0, 0.1), inset 0 -5px 0 rgba(0, 0, 0, 0.1);
            transition: transform 0.2s ease, filter 0.2s ease;
        }

        .card:hover {
            transform: scale(1.05);
            filter: brightness(1.1);
        }

        .card i {
            font-size: 70px;
            margin-bottom: 20px;
        }

        .card-title {
            font-size: 24px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .card-subtitle {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            margin-top: 5px;
            opacity: 0.9;
        }

        .card-orange {
            background-color: #ffa45b;
        }

        .card-yellow {
            background-color: #ffcc14;
        }

        .card-blue {
            background-color: #4f91e8;
        }

        /* =========================================
           ESTILOS DO ASSISTENTE (adicionado)
           ========================================= */
        
        /* ASSISTENTE RESPONSIVO */
        .assistant-wrapper {
            position: fixed;
            bottom: clamp(20px, 8vw, 30px);
            right: clamp(15px, 5vw, 20px);
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            z-index: 998;
            opacity: 0;
            visibility: hidden;
            transform: translateY(10px);
            transition: all 0.3s ease;
            max-width: min(90vw, 500px);
        }

        .assistant-wrapper.is-visible {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .speech-bubble {
            position: relative;
            background: white;
            border: 3px solid #FF69B4;
            border-radius: 20px 20px 20px 5px;
            padding: clamp(12px, 4vw, 20px) clamp(15px, 5vw, 25px);
            margin-bottom: 10px;
            width: 100%;
            color: #5E3A5E;
            font-weight: 600;
            font-size: clamp(0.8rem, 3.5vw, 1.1rem);
            box-shadow: 0 5px 0 #FFB6C1, 0 8px 15px rgba(0, 0, 0, 0.1);
            word-break: break-word;
        }

        .speech-bubble::after {
            content: '';
            position: absolute;
            bottom: -15px;
            right: clamp(30px, 10vw, 60px);
            border-width: 15px 15px 0;
            border-style: solid;
            border-color: #FF69B4 transparent;
        }

        .assistant-char-img {
            width: clamp(120px, 25vw, 200px);
            height: auto;
            transition: transform 0.3s ease;
            cursor: pointer;
            margin-right: 10px;
        }

        .assistant-char-img:hover {
            transform: scale(1.1) rotate(3deg);
        }

        .assistant-char-img:active {
            transform: scale(0.95);
        }

        /* HELP EMOJI RESPONSIVO */
        .help-emoji {
            position: fixed;
            bottom: clamp(20px, 8vw, 35px);
            right: clamp(15px, 5vw, 35px);
            background: #FF69B4;
            color: white;
            width: clamp(50px, 15vw, 70px);
            height: clamp(50px, 15vw, 70px);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(1.8rem, 6vw, 2.8rem);
            cursor: pointer;
            box-shadow: 0 8px 0 #FFB6C1, 0 10px 20px rgba(255, 105, 180, 0.4);
            transition: all 0.3s ease;
            border: 3px solid white;
            animation: wiggle 2s infinite;
            z-index: 999;
            touch-action: manipulation;
        }

        @keyframes wiggle {
            0%,
            100% {
                transform: rotate(0deg);
            }
            25% {
                transform: rotate(10deg);
            }
            75% {
                transform: rotate(-10deg);
            }
        }

        .help-emoji:hover {
            transform: scale(1.1);
        }

        .help-emoji:active {
            transform: scale(0.95);
            box-shadow: 0 4px 0 #FFB6C1, 0 8px 15px rgba(255, 105, 180, 0.4);
        }

        /* TOAST MÁGICO RESPONSIVO */
        .magic-toast {
            position: fixed;
            bottom: clamp(20px, 8vw, 30px);
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #FFF0F5;
            color: #5E3A5E;
            padding: clamp(10px, 3vw, 15px) clamp(15px, 5vw, 30px);
            border-radius: min(40px, 8vw);
            font-size: clamp(0.9rem, 4vw, 1.2rem);
            font-weight: 600;
            box-shadow: 0 8px 0 #FFB6C1, 0 12px 20px rgba(0, 0, 0, 0.2);
            border: 3px solid white;
            z-index: 9999;
            opacity: 0;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: clamp(8px, 3vw, 15px);
            max-width: min(90vw, 400px);
            width: max-content;
            pointer-events: none;
        }

        .magic-toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .magic-toast i {
            font-size: clamp(1.2rem, 5vw, 1.8rem);
            color: #FF69B4;
        }

        /* CONFETTI */
        .confetti {
            position: absolute;
            width: clamp(6px, 2vw, 10px);
            height: clamp(6px, 2vw, 10px);
            background: var(--brand-coral, #FF6B6B);
            opacity: 0.7;
            animation: confettiFall 3s linear infinite;
            pointer-events: none;
            border-radius: 50% 50% 0 50%;
            z-index: 10000;
        }

        @keyframes confettiFall {
            from {
                transform: translateY(-100px) rotate(0deg);
                opacity: 1;
            }
            to {
                transform: translateY(100vh) rotate(720deg);
                opacity: 0;
            }
        }

        /* Ajuste no modo escuro para o assistente */
        body.dark-mode .speech-bubble {
            background: #2E1B4A;
            color: #FFE6F0;
            border-color: #B983FF;
        }

        body.dark-mode .speech-bubble::after {
            border-color: #B983FF transparent;
        }

        body.dark-mode .magic-toast {
            background: #2E1B4A;
            color: #FFE6F0;
        }

        body.dark-mode .help-emoji {
            background: #B983FF;
            box-shadow: 0 8px 0 #9B6BDF;
        }

        /* =========================================
           RESPONSIVIDADE
           ========================================= */

        /* Tablets (até 1024px) */
        @media (max-width: 1024px) {
            body {
                padding-top: 75px;
            }

            header {
                padding: 0px 20px;
            }

            .logo img {
                height: 55px;
            }

            nav {
                gap: 10px;
            }

            .nav-btn {
                padding: 8px 15px;
                font-size: 14px;
            }

            .user-badge {
                padding: 5px 8px 5px 12px;
                gap: 8px;
            }

            .user-name {
                font-size: 14px;
            }

            .user-avatar {
                width: 32px;
                height: 32px;
            }

            .main-title {
                font-size: 28px;
                margin-bottom: 40px;
            }

            .cards-container {
                gap: 25px;
            }

            .card {
                width: 220px;
                height: 220px;
            }

            .card i {
                font-size: 60px;
            }

            .card-title {
                font-size: 22px;
            }
        }

        /* Mobile (até 768px) */
        @media (max-width: 768px) {
            body {
                padding-top: 130px;
            }

            header {
                flex-direction: column;
                padding: 15px 20px;
                gap: 15px;
            }

            .logo img {
                height: 50px;
            }

            nav {
                width: 100%;
                justify-content: center;
                gap: 12px;
            }

            .nav-btn {
                padding: 8px 12px;
                font-size: 12px;
            }

            .nav-btn i {
                font-size: 14px;
            }

            .user-area {
                margin-left: 0;
            }

            .user-badge {
                padding: 5px 10px 5px 12px;
                gap: 8px;
            }

            .user-name {
                font-size: 13px;
            }

            .user-avatar {
                width: 30px;
                height: 30px;
            }

            .main-title {
                font-size: 24px;
                margin-bottom: 30px;
            }

            .cards-container {
                gap: 20px;
                flex-direction: column;
            }

            .card {
                width: 260px;
                height: 260px;
            }

            .card i {
                font-size: 70px;
            }

            .card-title {
                font-size: 24px;
            }

            /* Ajuste das nuvens para mobile */
            .cloud-1,
            .cloud-2,
            .cloud-3,
            .cloud-4,
            .cloud-5 {
                transform: scale(0.7);
            }

            .layer-school {
                width: 250px;
                bottom: 25%;
            }

            .layer-tree-1 {
                width: 70px;
                right: 10%;
            }

            .layer-tree-2 {
                width: 55px;
                right: 3%;
            }

            .speech-bubble {
                max-width: 250px;
            }

            .assistant-wrapper {
                max-width: 280px;
            }
        }

        /* Mobile pequeno (até 500px) */
        @media (max-width: 500px) {
            body {
                padding-top: 140px;
            }

            header {
                padding: 12px 15px;
                gap: 12px;
                flex-direction: column;
            }

            .logo {
                width: 100%;
                display: flex;
                justify-content: center;
                margin-bottom: 5px;
            }

            .logo img {
                max-width: 100%;
                height: auto;
            }

            nav {
                gap: 8px;
                flex-wrap: wrap;
                justify-content: center;
                width: 100%;
            }

            .nav-btn {
                padding: 6px 10px;
                font-size: 11px;
            }

            .nav-btn i {
                font-size: 12px;
            }

            .user-badge {
                padding: 4px 8px 4px 10px;
                gap: 6px;
            }

            .user-name {
                font-size: 12px;
            }

            .user-avatar {
                width: 28px;
                height: 28px;
            }

            .main-title {
                font-size: 20px;
                margin-bottom: 25px;
            }

            .cards-container {
                gap: 15px;
            }

            .card {
                width: 240px;
                height: 240px;
            }

            .card i {
                font-size: 60px;
            }

            .card-title {
                font-size: 22px;
            }

            .card-subtitle {
                font-size: 11px;
            }

            /* Ajustes do paralax para mobile */
            .layer-ground-back,
            .layer-ground-mid,
            .layer-ground-front {
                background-size: 100% 100%;
            }

            .layer-ground-back {
                height: 40vh;
                bottom: 30%;
            }

            .layer-ground-mid {
                height: 35vh;
                bottom: 10%;
            }

            .layer-ground-front {
                height: 45vh;
                bottom: -5%;
            }

            .layer-school {
                width: 200px;
                bottom: 35%;
                left: 10px;
            }

            .layer-tree-1 {
                width: 55px;
                bottom: 35%;
                right: 30px;
            }

            .layer-tree-2 {
                width: 45px;
                bottom: 37%;
                right: 10px;
            }

            .help-emoji {
                width: 55px;
                height: 55px;
                font-size: 2rem;
                bottom: 15px;
                right: 15px;
            }

            .assistant-wrapper {
                bottom: 80px;
                right: 15px;
                max-width: 250px;
            }

            .speech-bubble {
                padding: 12px;
                font-size: 0.9rem;
            }

            .magic-toast {
                font-size: 0.9rem;
                padding: 10px 15px;
                max-width: 90%;
            }
        }

        /* Ajuste para telas muito grandes */
        @media (min-width: 1920px) {
            .layer-school {
                width: 450px;
            }

            .layer-tree-1 {
                width: 130px;
            }

            .layer-tree-2 {
                width: 100px;
            }

            .card {
                width: 280px;
                height: 280px;
            }

            .card i {
                font-size: 85px;
            }

            .card-title {
                font-size: 28px;
            }

            .main-title {
                font-size: 38px;
            }
        }

        /* ORIENTAÇÃO PAISAGEM EM MOBILE */
        @media (max-height: 500px) and (orientation: landscape) {
            .help-emoji {
                width: 45px;
                height: 45px;
                font-size: 1.5rem;
                bottom: 10px;
                right: 10px;
            }

            .assistant-wrapper {
                bottom: 60px;
                right: 10px;
            }

            .speech-bubble {
                padding: 8px 12px;
                font-size: 0.8rem;
            }
        }
    </style>
</head>

<body>

    <div class="parallax-container">
        <!-- Nuvens em posições diferentes -->
        <div class="cloud cloud-1"></div>
        <div class="cloud cloud-2"></div>
        <div class="cloud cloud-3"></div>
        <div class="cloud cloud-4"></div>
        <div class="cloud cloud-5"></div>

        <!-- Chão de fundo (ground02.png - montanha) -->
        <div class="layer-ground-back" id="parallax-ground-back"></div>

        <img src="src/img/background/school.png" class="layer-school" id="parallax-school" alt="Escola">
        <img src="src/img/background/tree.png" class="layer-tree-1" id="parallax-tree1" alt="Árvore 1">
        <img src="src/img/background/tree.png" class="layer-tree-2" id="parallax-tree2" alt="Árvore 2">

        <!-- Camadas do chão -->

    <!-- ========================================= -->

    <div class="help-emoji" id="helpEmojiBtn">
        <i class="fas fa-ellipsis-h"></i>

    <!-- Toast para mensagens -->
    <div id="magicToast" class="magic-toast">
        <i class="fas fa-magic"></i>
        <span id="toastMessage">✨ Mensagem mágica!</span>

    <!-- Container do assistente -->
    <div class="assistant-wrapper" id="assistantContainer">
        <div class="speech-bubble" id="bubbleText">
            Oi! Eu sou sua Prof. Clique em mim para conversarmos! 📖
        </div>
        <img src="src/img/Assistente00.png" alt="Assistente" class="assistant-char-img" id="assistantImage"
            onerror="this.src='data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 100 100\'%3E%3Ccircle cx=\'50\' cy=\'50\' r=\'45\' fill=\'%23FFD700\' /%3E%3Ccircle cx=\'35\' cy=\'40\' r=\'5\' fill=\'black\'/%3E%3Ccircle cx=\'65\' cy=\'40\' r=\'5\' fill=\'black\'/%3E%3Cpath d=\'M30 65 Q50 80,70 65\' stroke=\'black\' stroke-width=\'5\' fill=\'none\' /%3E%3C/svg%3E'">
    </div>

    <!-- Scripts do assistente -->
    <script src="./src/config.js"></script>
    <script src="./src/assistent.js"></script>

    <script>
        // Lógica do Modo Dia/Noite
        const themeToggle = document.getElementById('themeToggle');
        const body = document.body;

        themeToggle.addEventListener('click', () => {
            body.classList.toggle('dark-mode');

            if (body.classList.contains('dark-mode')) {
                themeToggle.classList.remove('fa-sun');
                themeToggle.classList.add('fa-moon');
            } else {
                themeToggle.classList.remove('fa-moon');
                themeToggle.classList.add('fa-sun');
            }
        });

        // Lógica do Efeito Parallax no Scroll
        const school = document.getElementById('parallax-school');
        const tree1 = document.getElementById('parallax-tree1');
        const tree2 = document.getElementById('parallax-tree2');
        const groundBack = document.getElementById('parallax-ground-back');
        const groundMid = document.getElementById('parallax-ground-mid');
        const groundFront = document.getElementById('parallax-ground-front');

        window.addEventListener('scroll', () => {
            let scrollY = window.scrollY;

            school.style.transform = `translateY(${scrollY * -0.08}px)`;
            tree1.style.transform = `translateY(${scrollY * -0.15}px)`;
            tree2.style.transform = `translateY(${scrollY * -0.12}px)`;

            // Diferentes velocidades para cada camada do chão
            groundBack.style.transform = `translateY(${scrollY * -0.05}px)`;
            groundMid.style.transform = `translateY(${scrollY * -0.08}px)`;
            groundFront.style.transform = `translateY(${scrollY * -0.15}px)`;
        });

        // Trocar Logo e ajustar tamanho baseando na largura da tela
        const logoImg = document.getElementById('logo-img');
        const headerElement = document.querySelector('header');

        if (logoImg) {
            function updateLogoResponsive() {
                if (window.innerWidth <= 500) {
                    logoImg.style.height = '80px';
                    logoImg.src = 'src/img/logo02.png';
                } else if (window.innerWidth <= 768) {
                    logoImg.style.height = '50px';
                    logoImg.src = 'src/img/logo.png';
                } else {
                    logoImg.style.height = '67.5px';
                    logoImg.src = 'src/img/logo.png';
                }
            }

            window.addEventListener('resize', updateLogoResponsive);
            updateLogoResponsive();
        }

        // Criar folhas caindo com posições aleatórias
        function createLeaf() {
            const leaf = document.createElement('div');
            leaf.classList.add('leaf');

            const size = Math.random() * 20 + 15;
            leaf.style.width = `${size}px`;
            leaf.style.height = `${size}px`;
            leaf.style.left = `${Math.random() * 100}%`;
            const duration = Math.random() * 12 + 8;
            const animationType = Math.floor(Math.random() * 3) + 1;
            let animation = '';
            if (animationType === 1) animation = 'fallLeaf1';
            else if (animationType === 2) animation = 'fallLeaf2';
            else animation = 'fallLeaf3';
            leaf.style.animation = `${animation} ${duration}s linear infinite`;
            leaf.style.animationDelay = `${Math.random() * -20}s`;
            leaf.style.opacity = Math.random() * 0.5 + 0.3;
            return leaf;
        }

        const parallaxContainer = document.querySelector('.parallax-container');
        for (let i = 0; i < 30; i++) {
            const leaf = createLeaf();
            parallaxContainer.appendChild(leaf);
        }

        setInterval(() => {
            const leaves = document.querySelectorAll('.leaf');
            if (leaves.length < 25) {
                const leaf = createLeaf();
                parallaxContainer.appendChild(leaf);
            }
        }, 5000);

        // Inicialização extra para garantir que o assistente funcione
        // Aguarda o DOM carregar completamente
        document.addEventListener('DOMContentLoaded', function() {
            // Pequeno delay para garantir que os scripts foram carregados
            setTimeout(() => {
                if (typeof window.showToast === 'function') {
                    window.showToast('🌈 Bem-vindo ao Press Start!');
                }
            }, 1500);
            
            setTimeout(() => {
                if (typeof window.showToast === 'function') {
                    window.showToast('🎮 Clique no robô para conversar com a Prof!');
                }
            }, 4000);
        });

        // Efeito de confetti para os cards
        function createConfetti() {
            const confetti = document.createElement('div');
            confetti.className = 'confetti';
            const colors = ['#FF69B4', '#FFD700', '#87CEEB', '#6FCF97', '#B983FF'];
            confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
            confetti.style.left = Math.random() * 100 + 'vw';
            confetti.style.animationDuration = Math.random() * 2 + 2 + 's';
            confetti.style.width = (Math.random() * 10 + 5) + 'px';
            confetti.style.height = confetti.style.width;
            document.body.appendChild(confetti);
            setTimeout(() => {
                confetti.remove();
            }, 5000);
        }

        // Adicionar evento de clique nos cards
        document.querySelectorAll('.card').forEach(card => {
            card.addEventListener('click', (e) => {
                e.preventDefault();
                for (let i = 0; i < 10; i++) {
                    createConfetti();
                }
                if (typeof window.showToast === 'function') {
                    window.showToast('🎉 Boa escolha! Vamos explorar!');
                }
                setTimeout(() => {
                    window.location.href = card.getAttribute('href');
                }, 500);
            });
        });

        // Corrigir o clique no user-badge
        document.querySelector('.user-badge')?.addEventListener('click', function() {
            if (typeof window.showToast === 'function') {
                window.showToast('✨ Olá, amiguinho! ✨');
            }
        });

    </script>
