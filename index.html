<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Press Start - Escola Ideal</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Baloo 2', cursive;
        }

        body {
            background-image: url('background.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* BARRA SUPERIOR (HEADER) */
        header {
            background-color: white;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .logo {
            color: #4f91e8;
            font-size: 28px;
            font-weight: 800;
        }

        nav {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .nav-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            border-radius: 25px;
            color: white;
            text-decoration: none;
            font-weight: 700;
            font-size: 16px;
            text-transform: uppercase;
        }

        .nav-btn i {
            font-size: 18px;
        }

        .bg-blue { background-color: #4f91e8; }
        .bg-orange { background-color: #ffa45b; }
        .bg-yellow { background-color: #ffcc14; }
        .bg-red { background-color: #ff6b6b; }
        .bg-green { background-color: #92b165; }

        /* Círculo do usuário */
        .user-circle {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, #4f91e8, #ffa45b);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            margin-left: 10px;
        }

        .user-circle:hover {
            transform: scale(1.1);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .user-circle i {
            font-size: 24px;
        }

        /* CONTEÚDO PRINCIPAL */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 30px;
        }

        .main-title {
            color: #4f91e8;
            font-size: 32px;
            font-weight: 800;
            text-transform: uppercase;
            margin-bottom: 50px;
        }

        /* BOTÕES GIGANTES (CARDS) */
        .cards-container {
            display: flex;
            gap: 30px;
            justify-content: center;
            align-items: center;
            width: 100%;
            margin-top: auto;
            margin-bottom: 10%;
        }

        .card {
            width: 240px;
            height: 240px;
            border-radius: 25px;
            border: 4px solid white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-decoration: none;
            box-shadow: 0 10px 15px rgba(0,0,0,0.1), inset 0 -5px 0 rgba(0,0,0,0.1);
            transition: transform 0.2s ease, filter 0.2s ease;
        }

        .card:hover {
            transform: scale(1.05);
            filter: brightness(1.1);
        }

        .card i {
            font-size: 70px;
            margin-bottom: 20px;
        }

        .card-title {
            font-size: 24px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .card-subtitle {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            margin-top: 5px;
            opacity: 0.9;
        }

        .card-orange { background-color: #ffa45b; }
        .card-yellow { background-color: #ffcc14; }
        .card-blue { background-color: #4f91e8; }
        .card-green { background-color: #92b165; }
        
    </style>
</head>
<body>

    <header>
        <div class="logo">PRESS START</div>
        <nav>
            <a href="#" class="nav-btn bg-orange"><i class="fa-solid fa-gamepad"></i> Joguinho</a>
            <a href="#" class="nav-btn bg-yellow"><i class="fa-solid fa-book-open"></i> História</a>
            <a href="#" class="nav-btn bg-red"><i class="fa-solid fa-gear"></i> Configuração</a>
            <div class="user-circle">
                <i class="fa-solid fa-user"></i>
            </div>
        </nav>
    </header>

    <main>
        <h1 class="main-title">Press Start: Escola Ideal</h1>
        
        <div class="cards-container">
            <a href="#" class="card card-orange">
                <i class="fa-solid fa-gamepad"></i>
                <div class="card-title">Joguinho</div>
                <div class="card-subtitle">A escola dos sonhos</div>
            </a>

            <a href="#" class="card card-yellow">
                <i class="fa-solid fa-book-open"></i>
                <div class="card-title">História</div>
                <div class="card-subtitle">Nossa trajetória</div>
            </a>

            <a href="#" class="card card-blue">
                <i class="fa-solid fa-trophy"></i>
                <div class="card-title">Prêmios</div>
                <div class="card-subtitle">Reconhecimentos</div>
            </a>
        </div>
    </main>

</body>
</html>
